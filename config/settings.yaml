# Job Search Settings
# Fill in your preferences before running the agent

# Cities to search in (include state for clarity)
cities:
  - "Los Angeles, CA"
  - "Newport Beach, CA"
  - "Huntington Beach, CA"
  - "Irvine, CA"
  - "San Diego, CA"
  - "Long Beach, CA"
  - "Costa Mesa, CA"
  - "New York, NY"
  - "Remote"

# Job titles to search for
job_titles:
  - "Data Scientist"
  - "Data Analyst"
  - "Quantitative Analyst"
  - "Data Engineer"

# Keywords that should appear in job descriptions
keywords:
  - "Python"
  - "SQL"
  - "Machine Learning"
  - "Data"

# Keywords that should NOT appear (hard filters)
exclude_keywords:
  - "10+ years"
  - "5+ years"
  - "security clearance"

# Job type filters
filters:
  employment_type: "full-time"        # full-time only
  remote_options:                      # include these work arrangements
    - "remote"
    - "hybrid"
    - "on-site"
  posted_within_days: 30              # only jobs posted in last N days
  min_match_score: 70                 # minimum Claude match score (0-100) to process

# Job boards to search
sources:
  linkedin: true
  ziprecruiter: false
  company_sites: true

# Max new jobs to process per run (after deduplication against the tracker)
# Already-seen jobs are always excluded via outputs/job_tracker.xlsx
max_jobs_per_run: 50

# Max companies to query on Greenhouse/Lever (top N by LinkedIn frequency)
max_companies_to_check: 100

# Output settings
output:
  google_sheet_id: "1oMoGyef8W_cosRmBANPRd_y7Jj-nKYQ8atDC6KbbrBw"
  drive_output_folder_id: "1TT7NiQqdoNsdGAOzMt4kSiuUPXgTbUGr"   # Drive folder ID for Google Docs output (shared with service account)
  applications_dir: "outputs/applications"   # Local DOCX backup location
