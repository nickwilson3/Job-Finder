{% extends "base.html" %}
{% block title %}Sign In — Job Finder{% endblock %}
{% block content %}
<div class="min-h-screen bg-gradient-to-br from-blue-50 to-sky-100 flex items-center justify-center -mx-6 -my-8 px-6 py-8">
  <div class="w-full max-w-sm">
    <h1 class="text-2xl font-bold mb-6 text-center text-gray-900">Sign In</h1>
    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 rounded px-4 py-3 mb-4 text-sm">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login" class="bg-white rounded-xl shadow-lg p-6 space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1">Email</label>
        <input type="email" name="email" required autofocus
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Password</label>
        <input type="password" name="password" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
      <button type="submit"
        class="w-full bg-gradient-to-r from-blue-600 to-sky-500 hover:from-blue-700 hover:to-sky-600 text-white font-medium py-2 rounded-lg text-sm shadow-sm hover:shadow transition-all duration-150">
        Sign In
      </button>
    </form>
    <p class="text-center text-sm text-gray-500 mt-4">
      Don't have an account? <a href="/register" class="text-blue-600 hover:underline">Register</a>
    </p>
  </div>
</div>
{% endblock %}
